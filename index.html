<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>VibePlayer</title>

<style>
body { background:#121212; color:white; font-family:Arial; margin:0; padding:20px; }

#assinatura { font-size:10px; text-align:center; color:#aaa; }
h2 { text-align:center; }
#nomeMusica { text-align:center; margin:5px 0; }

button {
    font-size:34px;
    margin:5px;
    padding:14px;
    border:none;
    border-radius:12px;
    background:#1db954;
    color:white;
}

#aleatorio {
    background:#888;
    border-radius:50%;
    width:54px;
    height:54px;
    display:inline-block;
    text-align:center;
    line-height:54px;
    font-size:30px;
}

#barra { width:90%; height:8px; background:#333; margin:10px auto; border-radius:5px; }
#progresso { height:100%; width:0%; background:#1db954; transition:0.2s linear; }

#tempo { text-align:center; font-size:12px; }

#listaMusicas {
    height:300px;
    overflow-y:scroll;
    scroll-behavior:smooth;
    margin-bottom:10px;
}

.musicaItem {
    display:flex;
    padding:10px;
    border-bottom:1px solid #333;
    cursor:pointer;
}

.musicaItem img {
    width:40px;height:40px;
    margin-right:10px;
    border-radius:6px;
    opacity:0;
    transition:0.3s;
}

.musicaItem.tocando {
    background:#1db954;
    color:black;
}

.ordenacaoBtn {
    background:#888;
    color:white;
    padding:8px;
    border-radius:8px;
}

.ordenacaoBtn.ativo {
    background:#1db954;
    color:black;
}

#scrollIndicator {
    position:absolute;
    right:2px;
    top:0;
    width:4px;
    height:10px;
    background:#1db954;
    border-radius:5px;
    opacity:0.7;
}

/* AD FIXO EMBAIXO DA LISTA */
#adContainer {
    width:100%;
    height:50px;
    background:#333;
    color:white;
    text-align:center;
    line-height:50px;
    border-radius:8px;
    margin-top:5px;
}
</style>
</head>

<body>

<div id="assinatura">feito por @murilo_lyrics</div>
<h2>🎧 VibePlayer</h2>

<div id="nomeMusica">carregando música</div>

<audio id="audio"></audio>

<div style="text-align:center;">
    <button onclick="prev()">⏮️</button>
    <button onclick="play()">▶️</button>
    <button onclick="pause()">⏸️</button>
    <button onclick="stop()">⏹️</button>
    <button onclick="next()">⏭️</button>
    <span id="aleatorio" onclick="toggleAleatorio()">🔀</span>
</div>

<div id="barra"><div id="progresso"></div></div>
<div id="tempo">00:00 / 00:00</div>

<div style="text-align:center;">
    <button id="btnRecentes" class="ordenacaoBtn ativo" onclick="sortMaisRecentes()">Recentes</button>
    <button id="btnAZ" class="ordenacaoBtn" onclick="sortAZ()">A-Z</button>
</div>

<input type="text" id="pesquisa" placeholder="Pesquisar música..." 
oninput="filtrarMusicas()" 
style="width:90%;margin:10px auto;display:block;padding:8px;border-radius:8px;border:none;background:#222;color:white;">

<div style="position:relative;">
    <div id="listaMusicas"></div>
    <div id="scrollIndicator"></div>
</div>

<!-- AD FIXO EMBAIXO DA LISTA -->
<div id="adContainer" style="width:100%; text-align:center; margin-top:10px;">
    <ins class="adsbygoogle"
         style="display:inline-block;width:320px;height:50px"
         data-ad-client="ca-pub-3940256099942544"
         data-ad-slot="6300978111"></ins>
    <script>
        (adsbygoogle = window.adsbygoogle || []).push({});
    </script>
</div>

<script>
// ==== ELEMENTOS ====
let audio = document.getElementById("audio");
let listaDiv = document.getElementById("listaMusicas");
let progresso = document.getElementById("progresso");
let tempoDiv = document.getElementById("tempo");
let pesquisaInput = document.getElementById("pesquisa");
let btnRecentes = document.getElementById("btnRecentes");
let btnAZ = document.getElementById("btnAZ");
let scrollIndicator = document.getElementById("scrollIndicator");

let musicListOriginal = [];
let musicList = [];
let currentIndex = -1;
let aleatorio = false;

// ==== CARREGAR MÚSICAS DO ANDROID ====
function carregarMusicasDoCelular() {
    try {
        let json = Android.listarMusicasJSON();
        let lista = JSON.parse(json);
        setMusicList(lista);
    } catch(e){
        console.error("Erro ao carregar músicas:", e);
        setMusicList([]);
    }
}

// ==== POPULAR LISTA ====
function setMusicList(list){
    musicListOriginal = list.slice();
    musicList = list.slice();
    renderLista();
}

// ==== RENDER LISTA ====
function renderLista(){
    listaDiv.innerHTML = "";

    let usarObserver = 'IntersectionObserver' in window;
    let observer = usarObserver ? new IntersectionObserver((entries)=>{
        entries.forEach(entry=>{
            if(entry.isIntersecting){
                carregarCapa(entry.target);
                observer.unobserve(entry.target);
            }
        });
    }, { root: listaDiv, threshold: 0.1 }) : null;

    musicList.forEach((path)=>{
        let nome = path.split("/").pop();
        try {
            let titulo = Android.getTitle(path);
            if(titulo) nome = titulo;
        } catch(e){}

        if(pesquisaInput.value && !nome.toLowerCase().includes(pesquisaInput.value.toLowerCase())){
            return;
        }

        let item = document.createElement("div");
        item.className = "musicaItem";
        item.setAttribute("data-path", path);

        let img = document.createElement("img");
        img.src = "default_capa.png";

        let span = document.createElement("span");
        span.innerText = nome;

        item.appendChild(img);
        item.appendChild(span);
        item.onclick = ()=>loadMusic(musicList.findIndex(p => p === path));
        listaDiv.appendChild(item);

        if(usarObserver){
            observer.observe(item);
        } else {
            setTimeout(()=>carregarCapa(item), 50);
        }
    });

    atualizarDestaque();
    autoScroll();
}

// ==== CARREGAR CAPA ====
function carregarCapa(item){
    let path = item.getAttribute("data-path");
    let img = item.querySelector("img");
    try{
        let base64 = Android.getCapa(path);
        if(base64){
            img.src = "data:image/jpeg;base64," + base64;
        }
    }catch(e){}
    img.style.opacity = 1;
}

// ==== SCROLL INDICATOR ====
listaDiv.addEventListener("scroll", ()=>{
    let scrollTop = listaDiv.scrollTop;
    let scrollHeight = listaDiv.scrollHeight - listaDiv.clientHeight;
    if(scrollHeight <= 0) return;
    let percent = scrollTop / scrollHeight;
    scrollIndicator.style.top = (percent * (listaDiv.clientHeight - 10)) + "px";
});

// ==== FUNÇÕES PLAYER ====
function loadMusic(index){
    currentIndex = index;
    audio.src = musicList[index];
    audio.play();
    document.getElementById("nomeMusica").innerText = decodeURIComponent(audio.src.split("/").pop());
    atualizarDestaque();
    autoScroll();
}

function atualizarDestaque(){
    let items = document.getElementsByClassName("musicaItem");
    for(let i=0;i<items.length;i++){
        items[i].classList.toggle("tocando", i===currentIndex);
    }
}

function autoScroll(){
    let items = document.getElementsByClassName("musicaItem");
    if(items[currentIndex]){
        items[currentIndex].scrollIntoView({behavior:"smooth", block:"center"});
    }
}

function play(){ if(audio.src) audio.play(); }
function pause(){ if(audio.src) audio.pause(); }
function stop(){ if(audio.src){ audio.pause(); audio.currentTime=0; } }

function next(){
    currentIndex = aleatorio ? Math.floor(Math.random()*musicList.length) : (currentIndex+1)%musicList.length;
    loadMusic(currentIndex);
}

function prev(){
    currentIndex = aleatorio ? Math.floor(Math.random()*musicList.length) : (currentIndex-1+musicList.length)%musicList.length;
    loadMusic(currentIndex);
}

function toggleAleatorio(){
    aleatorio = !aleatorio;
    document.getElementById("aleatorio").style.background = aleatorio ? "#1db954" : "#888";
}

function sortAZ(){
    btnAZ.classList.add("ativo");
    btnRecentes.classList.remove("ativo");
    requestAnimationFrame(()=>{
        musicList = musicListOriginal.slice().sort((a,b)=>{
            return decodeURIComponent(a.split("/").pop())
                .localeCompare(decodeURIComponent(b.split("/").pop()));
        });
        renderLista();
    });
}

function sortMaisRecentes(){
    btnRecentes.classList.add("ativo");
    btnAZ.classList.remove("ativo");
    requestAnimationFrame(()=>{
        musicList = musicListOriginal.slice();
        renderLista();
    });
}

function filtrarMusicas(){ renderLista(); }

// ==== EVENTOS AUDIO ====
audio.onended = ()=>next();
audio.ontimeupdate = ()=>{
    if(audio.duration){
        progresso.style.width = (audio.currentTime/audio.duration)*100+"%";
        let m1=Math.floor(audio.currentTime/60).toString().padStart(2,'0');
        let s1=Math.floor(audio.currentTime%60).toString().padStart(2,'0');
        let m2=Math.floor(audio.duration/60).toString().padStart(2,'0');
        let s2=Math.floor(audio.duration%60).toString().padStart(2,'0');
        tempoDiv.innerText = `${m1}:${s1} / ${m2}:${s2}`;
    }
}

// ==== CARREGAR AO INICIAR ====
window.onload = function() {
    carregarMusicasDoCelular();
}
</script>

</body>
</html>
